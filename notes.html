<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes — Study Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-back">&#8592; Home</a>
  <div class="nav-brand" style="margin-left:8px;">📝 Notes</div>
  <div class="nav-spacer"></div>
  <a href="dashboard.html" class="nav-link">Dashboard</a>
</nav>

<div style="display:flex;height:calc(100vh - 56px);overflow:hidden;">

  <!-- ── Left sidebar: subject + topic tree ─────────────────────── -->
  <div id="sidebar" style="width:260px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg-card);overflow-y:auto;padding:12px 0;">

    <!-- Level filter -->
    <div style="padding:0 12px 8px;display:flex;gap:4px;flex-wrap:wrap;">
      <button class="tab-btn active" id="nlevel-all"   onclick="filterLevel('all')"   style="padding:4px 10px;font-size:.75rem;">All</button>
      <button class="tab-btn"        id="nlevel-igcse" onclick="filterLevel('igcse')" style="padding:4px 10px;font-size:.75rem;">IGCSE</button>
      <button class="tab-btn"        id="nlevel-as"    onclick="filterLevel('as')"    style="padding:4px 10px;font-size:.75rem;">AS</button>
      <button class="tab-btn"        id="nlevel-a2"    onclick="filterLevel('a2')"    style="padding:4px 10px;font-size:.75rem;">A2</button>
    </div>

    <!-- Search -->
    <div style="padding:0 12px 10px;">
      <input type="text" class="input" id="notesSearch" placeholder="Search notes…" style="font-size:.82rem;"
        oninput="filterSearch(this.value)">
    </div>

    <div id="navTree"></div>
  </div>

  <!-- ── Right: notes content ───────────────────────────────────── -->
  <div id="notesContent" style="flex:1;overflow-y:auto;padding:24px 28px;">
    <div style="text-align:center;padding:60px 0;color:var(--text-dim);">
      <div style="font-size:2rem;margin-bottom:10px;">📝</div>
      <div style="font-size:1rem;font-weight:600;color:var(--text-bright);margin-bottom:4px;">Select a topic</div>
      <div style="font-size:.875rem;">Choose a subject and topic from the left panel to view notes.</div>
    </div>
  </div>
</div>

<style>
  .nav-subject {
    padding: 8px 12px;
    cursor: pointer;
    transition: background .12s;
    user-select: none;
  }
  .nav-subject:hover { background: var(--bg-card-hover); }
  .nav-subject-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: .85rem;
    color: var(--text-bright);
  }
  .nav-subject-icon { font-size: 1.1rem; }
  .nav-topic {
    padding: 5px 12px 5px 28px;
    font-size: .8rem;
    color: var(--text-dim);
    cursor: pointer;
    transition: background .12s, color .12s;
    border-radius: 0;
  }
  .nav-topic:hover { background: var(--accent-glow); color: var(--accent); }
  .nav-topic.active { background: var(--accent-glow); color: var(--accent); font-weight: 600; }
  .nav-subtopic {
    padding: 4px 12px 4px 40px;
    font-size: .77rem;
    color: var(--text-dim);
    cursor: pointer;
    transition: background .12s, color .12s;
  }
  .nav-subtopic:hover { background: var(--accent-glow); color: var(--accent); }
  .nav-subtopic.active { background: var(--accent-glow); color: var(--accent); font-weight: 600; }
  .nav-level-label {
    padding: 10px 12px 4px;
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }
  .notes-body h2 { font-size: 1.2rem; font-weight: 700; color: var(--text-bright); margin: 0 0 12px; }
  .notes-body h3 { font-size: .97rem; font-weight: 700; color: var(--accent); margin: 18px 0 7px; }
  .notes-body p  { margin-bottom: 10px; font-size: .9rem; line-height: 1.7; }
  .notes-body ul { padding-left: 22px; margin-bottom: 10px; }
  .notes-body li { font-size: .9rem; line-height: 1.6; margin-bottom: 3px; }
  .notes-body .formula {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 7px 14px;
    font-family: 'Courier New', monospace;
    font-size: .88rem;
    margin: 8px 0;
    display: block;
    color: var(--text-bright);
  }
  .notes-body .tip {
    background: var(--accent-glow);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 9px 14px;
    margin: 12px 0;
    font-size: .875rem;
    color: var(--text);
  }
  .notes-empty {
    text-align: center;
    padding: 48px 0;
    color: var(--text-dim);
    font-size: .9rem;
  }
  .notes-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .notes-chat-link {
    margin-left: auto;
  }
</style>

<script src="data.js"></script>
<script src="notes.js"></script>
<script>
  let currentLevel = 'all';
  let searchTerm   = '';

  const LEVEL_COLORS = { igcse: '#06b6d4', as: '#a855f7', a2: '#f59e0b' };

  /* ── Build sidebar tree ──────────────────────────────────────── */
  function buildTree() {
    const tree = document.getElementById('navTree');
    tree.innerHTML = '';

    const activeIds = getActiveSubjectIds ? getActiveSubjectIds() : ALL_SUBJECTS.map(s => s.id);
    const levels = ['igcse', 'as', 'a2'];

    levels.forEach(lv => {
      if (currentLevel !== 'all' && currentLevel !== lv) return;

      const subjects = ALL_SUBJECTS.filter(s =>
        s.level === lv && activeIds.includes(s.id)
      );
      if (!subjects.length) return;

      // Level label
      const lvLabel = document.createElement('div');
      lvLabel.className = 'nav-level-label';
      lvLabel.textContent = LEVEL_MAP[lv]?.name || lv.toUpperCase();
      tree.appendChild(lvLabel);

      subjects.forEach(s => {
        const subjEl = document.createElement('div');
        subjEl.className = 'nav-subject';

        const subjectNotes = NOTES[s.id] || {};
        const lvColor = LEVEL_COLORS[s.level] || '#6b7280';

        subjEl.innerHTML = `
          <div class="nav-subject-header">
            <span class="nav-subject-icon">${s.icon}</span>
            <span style="flex:1;">${s.name}</span>
            <span style="font-size:.65rem;font-weight:700;padding:1px 5px;border-radius:10px;background:${lvColor}20;color:${lvColor};">${s.level.toUpperCase()}</span>
          </div>
        `;

        // Add topics and subtopics
        const topicsWrap = document.createElement('div');
        topicsWrap.style.display = 'none'; // collapsed by default

        s.topics.forEach(t => {
          const topicEl = document.createElement('div');
          const topicHasNotes = !!subjectNotes[t.name];
          topicEl.className = 'nav-topic';
          topicEl.textContent = t.name;
          if (topicHasNotes) {
            topicEl.onclick = () => { selectItem(topicEl, s.id, t.name, null); };
          } else {
            topicEl.style.opacity = '.5';
            topicEl.style.cursor = 'default';
          }
          topicsWrap.appendChild(topicEl);

          t.subtopics.forEach(sub => {
            const subEl = document.createElement('div');
            const subHasNotes = !!subjectNotes[sub];
            subEl.className = 'nav-subtopic';
            subEl.textContent = sub;
            if (subHasNotes) {
              subEl.onclick = () => { selectItem(subEl, s.id, t.name, sub); };
            } else {
              subEl.style.opacity = '.4';
              subEl.style.cursor = 'default';
            }
            topicsWrap.appendChild(subEl);
          });
        });

        // Toggle expand/collapse on subject click
        subjEl.onclick = (e) => {
          const isOpen = topicsWrap.style.display !== 'none';
          topicsWrap.style.display = isOpen ? 'none' : 'block';
        };

        tree.appendChild(subjEl);
        tree.appendChild(topicsWrap);

        // Auto-expand if the subject has notes
        if (Object.keys(subjectNotes).length > 0) {
          topicsWrap.style.display = 'block';
        }
      });
    });
  }

  /* ── Select and show notes ───────────────────────────────────── */
  function selectItem(el, subjectId, topicName, subtopicName) {
    document.querySelectorAll('.nav-topic.active,.nav-subtopic.active').forEach(e => e.classList.remove('active'));
    el.classList.add('active');

    const subj = SUBJECT_MAP[subjectId];
    const key  = subtopicName || topicName;
    const subjectNotes = NOTES[subjectId] || {};
    const noteHtml = subjectNotes[key];

    const content = document.getElementById('notesContent');
    const lvColor = LEVEL_COLORS[subj?.level] || '#6b7280';
    const levelLabel = LEVEL_MAP[subj?.level]?.name || '';

    if (noteHtml) {
      content.innerHTML = `
        <div class="notes-header">
          <span style="font-size:1.5rem;">${subj?.icon || '📝'}</span>
          <div>
            <div style="font-weight:700;font-size:1.05rem;color:var(--text-bright);">${key}</div>
            <div style="font-size:.78rem;color:var(--text-dim);">${subj?.name} · <span style="color:${lvColor};">${levelLabel}</span></div>
          </div>
          <a href="chat.html?subject=${subjectId}" class="btn btn-ghost btn-sm notes-chat-link" style="flex-shrink:0;">🤖 Discuss with AI</a>
        </div>
        <div class="notes-body">${noteHtml}</div>
      `;
    } else {
      content.innerHTML = `
        <div class="notes-header">
          <span style="font-size:1.5rem;">${subj?.icon || '📝'}</span>
          <div>
            <div style="font-weight:700;font-size:1.05rem;color:var(--text-bright);">${key}</div>
            <div style="font-size:.78rem;color:var(--text-dim);">${subj?.name} · <span style="color:${lvColor};">${levelLabel}</span></div>
          </div>
        </div>
        <div class="notes-empty">
          <div style="font-size:1.5rem;margin-bottom:8px;">📝</div>
          <div>No pre-written notes for this topic yet.</div>
          <div style="margin-top:10px;font-size:.82rem;">
            <a href="chat.html?subject=${subjectId}" class="btn btn-ghost btn-sm">Ask the AI to explain this topic →</a>
          </div>
        </div>
      `;
    }
  }

  /* ── Level filter ─────────────────────────────────────────────── */
  function filterLevel(level) {
    currentLevel = level;
    ['all','igcse','as','a2'].forEach(l =>
      document.getElementById(`nlevel-${l}`)?.classList.toggle('active', l === level)
    );
    buildTree();
  }

  /* ── Search ───────────────────────────────────────────────────── */
  function filterSearch(val) {
    searchTerm = val.toLowerCase().trim();
    // Highlight matching items
    document.querySelectorAll('.nav-topic,.nav-subtopic').forEach(el => {
      if (!searchTerm) {
        el.style.opacity = el.style.cursor === 'default' ? '.4' : '';
        return;
      }
      const match = el.textContent.toLowerCase().includes(searchTerm);
      el.style.opacity = match ? '1' : '.25';
    });
  }

  /* Init */
  buildTree();
</script>
</body>
</html>
